services:

  # ── Next.js frontend — publicly available at localhost:3001 ─────────────────
  nextjs:
    build:
      context: .
      args:
        DOMAIN_URL: ${DOMAIN_URL}
        PUBLIC_API_BASE: ${PUBLIC_API_BASE}
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DOMAIN_URL: ${DOMAIN_URL}
      PUBLIC_API_BASE: ${PUBLIC_API_BASE}
    restart: unless-stopped

