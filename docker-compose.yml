services:

  # ── Next.js frontend — publicly available at localhost:3001 ─────────────────
  nextjs:
    build:
      context: .
      args:
        DOMAIN_URL: ${DOMAIN_URL}
        PUBLIC_API_BASE: ${PUBLIC_API_BASE}
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DOMAIN_URL: ${DOMAIN_URL}
      PUBLIC_API_BASE: ${PUBLIC_API_BASE}
      INTERNAL_API_URL: http://api:3001
    depends_on:
      - api
    restart: unless-stopped

  # ── Express API — handles write operations and server-side CSS compilation ───
  api:
    build:
      context: ./expresia-api
    ports:
      - "3002:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DOMAIN_URL: ${DOMAIN_URL}
      PUBLIC_API_BASE: ${PUBLIC_API_BASE}
      EXPRESIA_TOKEN: ${EXPRESIA_TOKEN}
      EXPRESIA_USER: ${EXPRESIA_USER}
      EXPRESIA_PASS: ${EXPRESIA_PASS}
      NEXTJS_URL: http://nextjs:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3